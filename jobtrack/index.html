<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=swap"
      rel="stylesheet"
    />
    <title>JobTrack — Career Manager</title>
    <script>
      // Apply the saved (or system) theme before first paint to avoid a flash.
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var dark = saved
            ? saved === 'dark'
            : window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {}
      })();
    </script>
    <style>
      /* Initial loader — shown instantly (before the JS bundle, CSS, or icon
         font load) and automatically replaced when React first renders. Pure
         CSS so there's no blank flash and no font-ligature text flash. */
      #initial-loader {
        position: fixed;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #f9f9ff;
      }
      html.dark #initial-loader { background: #0f1115; }
      #initial-loader .ring {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 3px solid #c2c6d6;
        border-top-color: #0058be;
        animation: il-spin 0.7s linear infinite;
      }
      html.dark #initial-loader .ring {
        border-color: #383c44;
        border-top-color: #adc6ff;
      }
      @keyframes il-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) {
        #initial-loader .ring { animation-duration: 1.6s; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader"><div class="ring"></div></div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
